<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f7efe9, #f2dada);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            width: 100%;
            max-width: 450px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-family: 'Playfair Display', cursive;
            font-size: 1.5rem;
            color: #5b3a29;
        }

        .sub {
            margin-top: 6px;
            font-size: 0.9rem;
            color: #555;
        }

        form {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn {
            background-color: #5b3a29;
            color: white;
            border-radius: 25px;
            padding: 10px;
            border: none;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #3f281d;
        }

            details {
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
        }

        summary {
            cursor: pointer;
            font-weight: 500;
            color: #5b3a29;
        }

    </style>
</head>

<body>

<div class="card">

    <header>
        <h1>Login</h1>
        <p class="sub">Welcome back!<br>Enter your username and password.</p>
        <details ontoggle="toggleMessage()">
        <summary class="text-center">Instructions</summary>
        <p>
            Correct credentials will grant access.
        </p>
    </details>
    </header>

    <form onsubmit="login(event)" novalidate>

        <label>
            Username
            <input type="text" id="username" placeholder="Username" required>
        </label>

        <label>
            Password
            <input type="password" id="password" placeholder="Min. 6 characters" required>
        </label>

        <button type="submit" class="btn">Login</button>
        <div id="result"></div>

    </form>

</div>

<script>
    let correctUsername = "Sukunas#1fan";
    let correctPassword = "123456";

    function login(event) {
        event.preventDefault();

        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "" || pass === "") {
            alert("Please fill in all fields!");
            document.getElementById("result").innerHTML = "⚠️ Missing input";

        } else if (user === correctUsername && pass === correctPassword) {
            document.getElementById("result").innerHTML = "✅ Access Granted";
            alert("Welcome, " + user + "!");

        } else {
            document.getElementById("result").innerHTML = "❌ Access Denied";
            alert("Invalid username or password!");
        }
    }

    function toggleMessage(){
        console.log("Instructions toggled");
    }
</script>

</body>
</html>
